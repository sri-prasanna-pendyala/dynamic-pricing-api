<svg viewBox="0 0 1050 700" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, monospace">
  <!-- Background -->
  <rect width="1050" height="700" fill="#0f172a" rx="10"/>
  <text x="525" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">Database Schema — Entity Relationship Diagram</text>

  <!-- Helper: table header macro via rect + text combos below -->

  <!-- ===== CATEGORIES ===== -->
  <g transform="translate(20,55)">
    <rect width="200" height="155" rx="6" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <rect width="200" height="28" rx="6" fill="#4338ca"/>
    <text x="100" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="white">categories</text>
    <line x1="0" y1="28" x2="200" y2="28" stroke="#6366f1" stroke-width="1"/>
    <text x="10" y="46"  font-size="10" fill="#a5b4fc">🔑 id         SERIAL PK</text>
    <text x="10" y="62"  font-size="10" fill="#c7d2fe">   name       VARCHAR(255)</text>
    <text x="10" y="78"  font-size="10" fill="#c7d2fe">   slug       VARCHAR(255) UNIQUE</text>
    <text x="10" y="94"  font-size="10" fill="#c7d2fe">   description TEXT</text>
    <text x="10" y="110" font-size="10" fill="#818cf8">🔗 parent_id  FK→categories</text>
    <text x="10" y="126" font-size="10" fill="#64748b">   created_at TIMESTAMPTZ</text>
    <text x="10" y="142" font-size="10" fill="#64748b">   updated_at TIMESTAMPTZ</text>
  </g>

  <!-- ===== PRODUCTS ===== -->
  <g transform="translate(280,55)">
    <rect width="210" height="170" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <rect width="210" height="28" rx="6" fill="#1d4ed8"/>
    <text x="105" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="white">products</text>
    <line x1="0" y1="28" x2="210" y2="28" stroke="#3b82f6" stroke-width="1"/>
    <text x="10" y="46"  font-size="10" fill="#a5b4fc">🔑 id          SERIAL PK</text>
    <text x="10" y="62"  font-size="10" fill="#93c5fd">   name        VARCHAR(255)</text>
    <text x="10" y="78"  font-size="10" fill="#93c5fd">   description TEXT</text>
    <text x="10" y="94"  font-size="10" fill="#93c5fd">   base_price  NUMERIC(12,2)</text>
    <text x="10" y="110" font-size="10" fill="#93c5fd">   status      VARCHAR(20)</text>
    <text x="10" y="126" font-size="10" fill="#60a5fa">🔗 category_id FK→categories</text>
    <text x="10" y="142" font-size="10" fill="#64748b">   created_at  TIMESTAMPTZ</text>
    <text x="10" y="158" font-size="10" fill="#64748b">   updated_at  TIMESTAMPTZ</text>
  </g>

  <!-- ===== VARIANTS ===== -->
  <g transform="translate(560,55)">
    <rect width="225" height="200" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <rect width="225" height="28" rx="6" fill="#0e7490"/>
    <text x="112" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="white">variants</text>
    <line x1="0" y1="28" x2="225" y2="28" stroke="#06b6d4" stroke-width="1"/>
    <text x="10" y="46"  font-size="10" fill="#a5b4fc">🔑 id                SERIAL PK</text>
    <text x="10" y="62"  font-size="10" fill="#67e8f9">🔗 product_id        FK→products</text>
    <text x="10" y="78"  font-size="10" fill="#a5f3fc">   sku               VARCHAR(100) UNIQUE</text>
    <text x="10" y="94"  font-size="10" fill="#a5f3fc">   attributes        JSONB</text>
    <text x="10" y="110" font-size="10" fill="#a5f3fc">   price_adjustment  NUMERIC(12,2)</text>
    <text x="10" y="126" font-size="10" fill="#a5f3fc">   stock_quantity    INT ≥ 0</text>
    <text x="10" y="142" font-size="10" fill="#a5f3fc">   reserved_quantity INT ≥ 0</text>
    <text x="10" y="158" font-size="10" fill="#5eead4">   ← available = stock - reserved</text>
    <text x="10" y="174" font-size="10" fill="#64748b">   created_at        TIMESTAMPTZ</text>
    <text x="10" y="190" font-size="10" fill="#64748b">   updated_at        TIMESTAMPTZ</text>
  </g>

  <!-- ===== PRICING_RULES ===== -->
  <g transform="translate(820,55)">
    <rect width="215" height="265" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect width="215" height="28" rx="6" fill="#92400e"/>
    <text x="107" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="white">pricing_rules</text>
    <line x1="0" y1="28" x2="215" y2="28" stroke="#f59e0b" stroke-width="1"/>
    <text x="10" y="46"  font-size="10" fill="#a5b4fc">🔑 id             SERIAL PK</text>
    <text x="10" y="62"  font-size="10" fill="#fde68a">   name           VARCHAR(255)</text>
    <text x="10" y="78"  font-size="10" fill="#fde68a">   rule_type      VARCHAR(50)</text>
    <text x="10" y="94"  font-size="10" fill="#6b7280" font-style="italic">   bulk|user_tier|seasonal|promo</text>
    <text x="10" y="110" font-size="10" fill="#fde68a">   discount_type  percentage|fixed</text>
    <text x="10" y="126" font-size="10" fill="#fde68a">   discount_value NUMERIC</text>
    <text x="10" y="142" font-size="10" fill="#fbbf24">   min_quantity   INT (bulk)</text>
    <text x="10" y="158" font-size="10" fill="#fbbf24">   user_tier      VARCHAR(50)</text>
    <text x="10" y="174" font-size="10" fill="#fbbf24">   starts_at      TIMESTAMPTZ</text>
    <text x="10" y="190" font-size="10" fill="#fbbf24">   ends_at        TIMESTAMPTZ</text>
    <text x="10" y="206" font-size="10" fill="#fbbf24">   promo_code     VARCHAR(100)</text>
    <text x="10" y="222" font-size="10" fill="#fbbf24">   priority       INT (lower=first)</text>
    <text x="10" y="238" font-size="10" fill="#fbbf24">   is_active      BOOLEAN</text>
    <text x="10" y="254" font-size="10" fill="#d97706">🔗 product_id  FK / category_id FK</text>
  </g>

  <!-- ===== CARTS ===== -->
  <g transform="translate(20,290)">
    <rect width="200" height="130" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <rect width="200" height="28" rx="6" fill="#065f46"/>
    <text x="100" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="white">carts</text>
    <line x1="0" y1="28" x2="200" y2="28" stroke="#10b981" stroke-width="1"/>
    <text x="10" y="46"  font-size="10" fill="#a5b4fc">🔑 id         SERIAL PK</text>
    <text x="10" y="62"  font-size="10" fill="#6ee7b7">   user_id    VARCHAR(255)</text>
    <text x="10" y="78"  font-size="10" fill="#6ee7b7">   user_tier  VARCHAR(50)</text>
    <text x="10" y="94"  font-size="10" fill="#6ee7b7">   status     active|checked_out</text>
    <text x="10" y="110" font-size="10" fill="#64748b">   created_at TIMESTAMPTZ</text>
    <text x="10" y="126" font-size="10" fill="#64748b">   updated_at TIMESTAMPTZ</text>
  </g>

  <!-- ===== CART_ITEMS ===== -->
  <g transform="translate(280,290)">
    <rect width="225" height="170" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <rect width="225" height="28" rx="6" fill="#5b21b6"/>
    <text x="112" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="white">cart_items</text>
    <line x1="0" y1="28" x2="225" y2="28" stroke="#8b5cf6" stroke-width="1"/>
    <text x="10" y="46"  font-size="10" fill="#a5b4fc">🔑 id                  SERIAL PK</text>
    <text x="10" y="62"  font-size="10" fill="#c4b5fd">🔗 cart_id             FK→carts</text>
    <text x="10" y="78"  font-size="10" fill="#c4b5fd">🔗 variant_id          FK→variants</text>
    <text x="10" y="94"  font-size="10" fill="#ddd6fe">   quantity            INT</text>
    <text x="10" y="110" font-size="10" fill="#fde68a">   unit_price_snapshot NUMERIC ← snapshot!</text>
    <text x="10" y="126" font-size="10" fill="#ddd6fe">   price_breakdown     JSONB</text>
    <text x="10" y="142" font-size="10" fill="#64748b">   created_at          TIMESTAMPTZ</text>
    <text x="10" y="158" font-size="10" fill="#64748b">   UNIQUE(cart_id, variant_id)</text>
  </g>

  <!-- ===== INVENTORY_RESERVATIONS ===== -->
  <g transform="translate(560,290)">
    <rect width="225" height="170" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <rect width="225" height="28" rx="6" fill="#991b1b"/>
    <text x="112" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="white">inventory_reservations</text>
    <line x1="0" y1="28" x2="225" y2="28" stroke="#ef4444" stroke-width="1"/>
    <text x="10" y="46"  font-size="10" fill="#a5b4fc">🔑 id         SERIAL PK</text>
    <text x="10" y="62"  font-size="10" fill="#fca5a5">🔗 variant_id FK→variants</text>
    <text x="10" y="78"  font-size="10" fill="#fca5a5">🔗 cart_id    FK→carts</text>
    <text x="10" y="94"  font-size="10" fill="#fecaca">   quantity  INT</text>
    <text x="10" y="110" font-size="10" fill="#f87171">   expires_at TIMESTAMPTZ ← TTL 15min</text>
    <text x="10" y="126" font-size="10" fill="#fecaca">   status    active|released|converted</text>
    <text x="10" y="142" font-size="10" fill="#64748b">   created_at TIMESTAMPTZ</text>
    <text x="10" y="158" font-size="10" fill="#64748b">   updated_at TIMESTAMPTZ</text>
  </g>

  <!-- ===== ORDERS ===== -->
  <g transform="translate(20,510)">
    <rect width="200" height="140" rx="6" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
    <rect width="200" height="28" rx="6" fill="#9d174d"/>
    <text x="100" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="white">orders</text>
    <line x1="0" y1="28" x2="200" y2="28" stroke="#ec4899" stroke-width="1"/>
    <text x="10" y="46"  font-size="10" fill="#a5b4fc">🔑 id           SERIAL PK</text>
    <text x="10" y="62"  font-size="10" fill="#fbcfe8">🔗 cart_id      FK→carts</text>
    <text x="10" y="78"  font-size="10" fill="#fbcfe8">   user_id      VARCHAR(255)</text>
    <text x="10" y="94"  font-size="10" fill="#fbcfe8">   total_amount NUMERIC(12,2)</text>
    <text x="10" y="110" font-size="10" fill="#fbcfe8">   status       VARCHAR(20)</text>
    <text x="10" y="126" font-size="10" fill="#64748b">   created_at   TIMESTAMPTZ</text>
  </g>

  <!-- ===== ORDER_ITEMS ===== -->
  <g transform="translate(280,510)">
    <rect width="210" height="140" rx="6" fill="#1e293b" stroke="#f472b6" stroke-width="2"/>
    <rect width="210" height="28" rx="6" fill="#831843"/>
    <text x="105" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="white">order_items</text>
    <line x1="0" y1="28" x2="210" y2="28" stroke="#f472b6" stroke-width="1"/>
    <text x="10" y="46"  font-size="10" fill="#a5b4fc">🔑 id         SERIAL PK</text>
    <text x="10" y="62"  font-size="10" fill="#fce7f3">🔗 order_id   FK→orders</text>
    <text x="10" y="78"  font-size="10" fill="#fce7f3">🔗 variant_id FK→variants</text>
    <text x="10" y="94"  font-size="10" fill="#fce7f3">   quantity  INT</text>
    <text x="10" y="110" font-size="10" fill="#fce7f3">   unit_price NUMERIC(12,2)</text>
    <text x="10" y="126" font-size="10" fill="#64748b">   created_at TIMESTAMPTZ</text>
  </g>

  <!-- RELATIONSHIP LINES -->
  <!-- categories self-ref -->
  <path d="M 120 140 Q 10 170 120 210" stroke="#6366f1" stroke-width="1.2" fill="none" stroke-dasharray="4,3"/>
  <text x="12" y="180" font-size="9" fill="#6366f1">parent</text>

  <!-- categories → products -->
  <line x1="220" y1="155" x2="280" y2="155" stroke="#3b82f6" stroke-width="1.2"/>

  <!-- products → variants -->
  <line x1="490" y1="130" x2="560" y2="130" stroke="#06b6d4" stroke-width="1.2"/>

  <!-- carts → cart_items -->
  <line x1="220" y1="355" x2="280" y2="355" stroke="#8b5cf6" stroke-width="1.2"/>

  <!-- variants → cart_items -->
  <line x1="672" y1="255" x2="420" y2="340" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- carts → reservations -->
  <line x1="220" y1="380" x2="560" y2="360" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- variants → reservations -->
  <line x1="672" y1="255" x2="650" y2="290" stroke="#ef4444" stroke-width="1.2"/>

  <!-- carts → orders -->
  <line x1="120" y1="420" x2="120" y2="510" stroke="#ec4899" stroke-width="1.2"/>

  <!-- orders → order_items -->
  <line x1="220" y1="575" x2="280" y2="575" stroke="#f472b6" stroke-width="1.2"/>

  <!-- variants → order_items -->
  <line x1="672" y1="255" x2="420" y2="540" stroke="#f472b6" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <rect x="560" y="510" width="475" height="80" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="575" y="530" font-size="11" font-weight="700" fill="#94a3b8">INDEXES</text>
  <text x="575" y="548" font-size="10" fill="#64748b">• variants(product_id), variants(sku)</text>
  <text x="575" y="564" font-size="10" fill="#64748b">• pricing_rules(rule_type), pricing_rules(promo_code)</text>
  <text x="575" y="580" font-size="10" fill="#64748b">• inventory_reservations(expires_at) WHERE status='active'</text>
  <text x="575" y="596" font-size="10" fill="#64748b">• carts(user_id), cart_items(cart_id, variant_id)</text>
</svg>
